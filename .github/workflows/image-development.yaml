name: Image Build Check

on:
  pull_request:
    branches:
      - 'main'
      - 'release/*'
    paths:
      - 'ci.Dockerfile'
      - 'dev.Dockerfile'
      - 'scripts/wasm-deps.sh'
      - '.github/workflows/image-development.yaml'

jobs:
  check-images:
    name: Validate Image Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ['ci.Dockerfile', 'dev.Dockerfile']
    steps:
      - name: Run actions/checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run docker/setup-buildx-action
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./${{ matrix.file }}
          push: false
