name: Image Build Check

on:
  pull_request:
    branches:
      - 'main'
      - 'release/*'
    paths:
      - 'ci.Dockerfile'
      - 'dev.Dockerfile'
      - 'scripts/wasm-deps.sh'
      - '.github/workflows/image-development.yaml'

jobs:
  check-images:
    name: Validate Image Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ['ci.Dockerfile', 'dev.Dockerfile']
    steps:
      - name: Run actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Run docker/setup-buildx-action
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./${{ matrix.file }}
          push: false
